<!DOCTYPE html>
<html>
<head>
<title>Register</title>

<style>
body {
  margin:0;
  font-family:'Segoe UI';
  color:white;
  background:url('https://images.unsplash.com/photo-1551288049-bebda4e38f71') no-repeat center/cover;
}
body::before{
  content:"";
  position:fixed; inset:0;
  background:rgba(0,0,0,0.6);
}

.box{
  position:relative;
  width:350px;
  margin:120px auto;
  padding:30px;
  border-radius:18px;
  backdrop-filter: blur(18px);
  background:rgba(255,255,255,0.1);
  border:1px solid rgba(255,255,255,0.25);
}

input{
  width:100%;
  padding:12px;
  margin:10px 0;
  border-radius:10px;
  border:none;
}

button{
  width:100%;
  padding:12px;
  background:linear-gradient(45deg,#00eaff,#00ff9c);
  border:none;
  border-radius:10px;
  font-weight:bold;
}
</style>
</head>

<body>
<div class="box">
<h2>Register</h2>

<input id="username" placeholder="Username">
<input id="password" type="password" placeholder="Password">

<button onclick="register()">Register</button>
<p id="msg"></p>

<p>Already have account? <a href="/login_page">Login</a></p>
</div>

<script>
function register(){
fetch("/register",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
username:document.getElementById("username").value,
password:document.getElementById("password").value
})
})
.then(r=>r.json())
.then(res=>{
document.getElementById("msg").innerText = res.msg;
});
}
</script>
</body>
</html>
