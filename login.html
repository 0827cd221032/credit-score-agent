<!DOCTYPE html>
<html>
<head>
<title>Login</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI';
    color: white;

    background: url('https://images.unsplash.com/photo-1551288049-bebda4e38f71') no-repeat center center/cover;
}

/* overlay */
body::before {
    content: "";
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.65);
    z-index: 0;
}

/* center box */
.container {
    position: relative;
    z-index: 1;

    display: flex;
    justify-content: center;
    align-items: center;

    height: 100vh;
}

/* glass card */
.box {
    width: 350px;
    padding: 30px;

    border-radius: 18px;
    backdrop-filter: blur(20px);

    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.25);

    box-shadow: 0 10px 40px rgba(0,0,0,0.4);
}

/* inputs */
input {
    width: 100%;
    padding: 12px;
    margin: 12px 0;

    border-radius: 10px;
    border: none;

    background: rgba(0,0,0,0.4);
    color: white;
}

/* button */
button {
    width: 100%;
    padding: 12px;

    border: none;
    border-radius: 10px;

    font-weight: bold;
    background: linear-gradient(45deg,#00eaff,#00ff9c);
    cursor: pointer;
}

/* link */
a {
    color: #00eaff;
}
</style>

</head>

<body>

<div class="container">
<div class="box">

<h2>Login</h2>

<input id="username" placeholder="Username">
<input id="password" type="password" placeholder="Password">

<button onclick="login()">Login</button>

<p id="msg"></p>

<p>New user? <a href="/register_page">Register</a></p>

</div>
</div>

<script>
function login(){
  fetch("/login", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({
      username: document.getElementById("username").value,
      password: document.getElementById("password").value
    })
  })
  .then(r=>r.json())
  .then(res=>{
    if(res.msg === "success"){
      localStorage.setItem("token", res.token);
      window.location.href = "/dashboard";
    } else {
      document.getElementById("msg").innerText = "Login failed";
    }
  });
}
</script>

</body>
</html>
