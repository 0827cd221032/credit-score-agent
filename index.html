<!DOCTYPE html>
<html>
<head>
<title>Credit AI Dashboard</title>

<style>
body { margin:0; font-family:'Segoe UI'; color:white;
background:url('https://images.unsplash.com/photo-1551288049-bebda4e38f71') no-repeat center/cover;}
body::before{content:"";position:fixed;inset:0;background:rgba(0,0,0,0.6);}

.container{width:95%;max-width:1200px;margin:40px auto;display:grid;grid-template-columns:1fr 1fr;gap:25px;}
.card{background:rgba(255,255,255,0.12);padding:20px;border-radius:15px;}
input,select{width:100%;padding:10px;margin:8px 0;background:#111;color:white;border-radius:8px;border:none;}
button{width:100%;padding:12px;margin-top:10px;background:#00eaff;border:none;border-radius:10px;cursor:pointer;}
.score{text-align:center;font-size:40px;}
.logout{position:fixed;top:20px;right:20px;}
</style>
</head>

<body>

<button class="logout" onclick="logout()">Logout</button>

<div class="container">

<div class="card">
<h2>Input</h2>

<input id="income" placeholder="Income">
<input id="usage" placeholder="Credit Usage">
<select id="late">
<option value="0">No Late Payment</option>
<option value="1">Late Payment</option>
</select>

<input id="loans" placeholder="Loans">

<button onclick="predict()">Analyze</button>

<h3>AI</h3>
<p id="aiText">--</p>
</div>

<div class="card">
<h2>Result</h2>

<div id="score" class="score">--</div>
<p id="conf">--</p>

<h3>Plan</h3>
<p id="plan">--</p>

<h3>Tips</h3>
<ul id="tips"></ul>

<h3>History</h3>
<ul id="history"></ul>

</div>

</div>

<script>
if(!localStorage.getItem("token")){
    window.location.href="/login_page";
}

function predict(){

document.getElementById("score").innerText="Loading...";
document.getElementById("aiText").innerText="Loading...";
document.getElementById("plan").innerText="Loading...";

let data={
income:+income.value,
credit_usage:+usage.value,
late_payment:+late.value,
loans:+loans.value
};

fetch("/predict",{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":"Bearer "+localStorage.getItem("token")
},
body:JSON.stringify(data)
})
.then(r=>r.json())
.then(res=>{

console.log(res); // 🔥 DEBUG

// ✅ FIXED mapping
document.getElementById("score").innerText=res.credit_score || "Error";
document.getElementById("conf").innerText=res.confidence || "--";
document.getElementById("aiText").innerText=res.ai_explanation || "No AI";
document.getElementById("plan").innerText=res.plan || "No Plan";

// tips
document.getElementById("tips").innerHTML =
(res.advice?.do || []).map(x=>`<li>${x}</li>`).join("");

// history
loadHistory();

})
.catch(err=>{
console.log(err);
alert("Error calling API");
});

}

function loadHistory(){
fetch("/history",{
headers:{
"Authorization":"Bearer "+localStorage.getItem("token")
}
})
.then(r=>r.json())
.then(data=>{
document.getElementById("history").innerHTML =
data.map(x=>`<li>${x[0]} (${x[1]})</li>`).join("");
});
}

function logout(){
localStorage.removeItem("token");
window.location.href="/login_page";
}
</script>

</body>
</html>
